  <div class="modal" id="film-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Tambah Jadwal Baru</h3>
                <button class="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="film-form" action="/admin/jadwal" method="post">
                    
                        <div class="form-group">
                        <label for="film-genre">Film</label>
                        <select class="form-control" name="film_id" required>
                            <% filem.forEach(films =>{ %>
                            <option value="<%= films.id %>"><%= films.judul %></option>
                           <% }) %>
                        </select>
                    </div>
                     <div class="form-group">
                            <label for="film-title">Tanggal Tayang</label>
                            <input type="date" id="film-title" class="form-control" name="tanggal" required>
                        </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="film-title">Mulai Tayang</label>
                            <input type="text" id="film-title" class="form-control" name="jamtayang" required>
                        </div>
                        <div class="form-group">
                            <label for="film-year">Selesai Tayang</label>
                            <input type="text" id="film-year" class="form-control" name="jamselesai" required>
                        </div>
                    </div>
                    
                   
                      <div class="modal-footer">
                        <button class="btn btn-primary" type="submit">Simpan Film</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script>

        const sidebarToggle = document.getElementById('sidebar-toggle');
        const sidebar = document.querySelector('.sidebar');
        const mainContent = document.querySelector('.main-content');

        sidebarToggle.addEventListener('click', () => {
            sidebar.classList.toggle('active');
        });

  
        const addFilmBtn = document.getElementById('add-film-btn');
        const editFilmBtns = document.querySelectorAll('.edit-btn');
        const filmModal = document.getElementById('film-modal');
        const closeModalBtns = document.querySelectorAll('.close-modal');
        const saveFilmBtn = document.getElementById('save-film');
        const modalTitle = document.getElementById('modal-title');

        // Open Add Film Modal
        addFilmBtn.addEventListener('click', () => {
            modalTitle.textContent = 'Tambah Jadwal baru';
            document.getElementById('film-form').reset();
            filmModal.classList.add('show');
            filmModal.style.display = 'flex';
            
            // Initialize Select2
            $('#film-genre').select2({
                placeholder: "Pilih genre",
                width: '100%',
                dropdownParent: $('#film-modal')
            });
            
            setTimeout(() => {
                filmModal.querySelector('.modal-content').style.transform = 'translateY(0)';
                filmModal.querySelector('.modal-content').style.opacity = '1';
            }, 10);
        });

  
        editFilmBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                modalTitle.textContent = 'Edit Film';
         
                filmModal.classList.add('show');
                filmModal.style.display = 'flex';
                
                // Initialize Select2
                $('#film-genre').select2({
                    placeholder: "Pilih genre",
                    width: '100%',
                    dropdownParent: $('#film-modal')
                });
                
                setTimeout(() => {
                    filmModal.querySelector('.modal-content').style.transform = 'translateY(0)';
                    filmModal.querySelector('.modal-content').style.opacity = '1';
                }, 10);
            });
        });


        function closeModal() {
            filmModal.querySelector('.modal-content').style.transform = 'translateY(-20px)';
            filmModal.querySelector('.modal-content').style.opacity = '0';
            
            setTimeout(() => {
                filmModal.classList.remove('show');
                filmModal.style.display = 'none';
            }, 300);
        }

        closeModalBtns.forEach(btn => {
            btn.addEventListener('click', closeModal);
        });

     
        window.addEventListener('click', (e) => {
            if (e.target === filmModal) {
                closeModal();
            }
        });

        // Save Film
        saveFilmBtn.addEventListener('click', () => {

            alert('Film berhasil disimpan!');
            closeModal();
        });


        function handleResponsive() {
            if (window.innerWidth <= 992) {
                sidebar.classList.remove('active');
            } else {
                sidebar.classList.add('active');
            }
        }

        window.addEventListener('resize', handleResponsive);
        handleResponsive();
    </script>
</body>
</html>
